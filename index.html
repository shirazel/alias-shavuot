<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>שבוּעס - פסג"ה חדרה</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;500;600;700;800&display=swap');
        
        :root {
            --brand-green: #008d41;
            --brand-yellow: #f8b61c;
            --bg-light-green: #f1fcf4;
            --delicate-black: #374151;
        }

        body {
            font-family: 'Assistant', sans-serif;
            background-color: var(--bg-light-green);
            background-image: radial-gradient(rgba(0, 141, 65, 0.05) 2px, transparent 2px);
            background-size: 30px 30px;
            margin: 0;
            padding: 0;
            user-select: none;
            touch-action: manipulation;
        }

        .bg-brand-green { background-color: var(--brand-green) !important; }
        .text-brand-green { color: var(--brand-green) !important; }
        .border-brand-green { border-color: var(--brand-green) !important; }

        .card-shadow {
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
        }

        /* מניעת מריחה! הלוח יהיה ריבוע מושלם תמיד */
        .board-grid {
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            grid-template-rows: repeat(10, 1fr);
            aspect-ratio: 1 / 1; 
            margin: 0 auto;
        }
        
        .thief-space {
            background-color: #dcfce7;
            border: 2px solid var(--brand-green) !important;
            box-shadow: inset 0 0 10px rgba(0, 141, 65, 0.05);
        }

        .modal-overlay {
            background-color: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(4px);
            z-index: 1000;
        }

        .instruction-link {
            color: var(--brand-green);
            font-size: 13px;
            font-weight: 400;
            text-decoration: underline;
            background: none;
            border: none;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .logo-container {
            display: inline-flex;
            align-items: center;
            color: var(--brand-green);
            font-weight: 700;
            line-height: 1;
            position: relative;
        }

        .shuruk-dot {
            display: inline-block;
            width: 0.36em; 
            height: 0.36em;
            background-color: var(--brand-yellow);
            border-radius: 50%;
            margin-right: -0.1em; 
            margin-left: -0.06em; 
            vertical-align: middle;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.1);
            transform: translateY(0.08em); 
        }

        .projector-slider {
            -webkit-appearance: none;
            width: 100%;
            height: 6px;
            background: #e5e7eb;
            border-radius: 5px;
            outline: none;
        }
        .projector-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 18px;
            height: 18px;
            background: var(--brand-green);
            cursor: pointer;
            border-radius: 50%;
        }

        .playing-card {
            background-color: white;
            border-radius: 2rem;
            box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(0, 141, 65, 0.1);
            width: 100%;
            max-width: 320px;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            margin: 0 auto;
            position: relative;
            overflow: hidden;
        }
        
        .playing-card::before {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 100%;
            height: 6px;
            background-color: var(--brand-green);
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback, useRef, useMemo } = React;
        const ICONS = ['🧀', '🌾', '🍇', '🍷', '🍯', '🕊️', '🚜', '🧺', '🐮', '🥞'];
        const WORDS_POOL = [
            "חג שבועות", "ביכורים", "טנא", "הר סיני", "מתן תורה", "עשרת הדיברות", "לוחות הברית", "משה רבנו",
            "עוגת גבינה", "חלב", "פרה", "חקלאות", "מים", "זר פרחים", "לבן", "קציר",
            "חיטה", "שעורה", "גפן", "תאנה", "רימון", "זית", "דבש", "שבעת המינים",
            "מגילת רות", "נעמי", "בועז", "אדמה", "שדה", "טרקטור", "מגל", "פירות",
            "תנובה", "כבשה", "יוגורט", "חמאה", "מעדן", "גלידה", "חג הקציר", "חג הביכורים",
            "עצרת", "תיקון ליל שבועות", "בלינצ'ס", "פשטידה", "כרם", "פרדס", "מעיין", "שמש",
            "תבואה", "אלומות", "אוהל", "מדבר", "לחם", "בגדים לבנים", "תפילה", "ארץ זבת חלב",
            "ירושלים", "בית המקדש", "ענבים", "שמן זית", "דבורה", "כוורת", "כד חלב", "ספירת העומר",
            "פיצה", "טוסט", "רובה מים", "השפרצה", "בריכה", "חקלאי", "קצפת", "שבועה",
            "גבינה צהובה", "גבינה לבנה", "רפת", "עטינים", "חציר", "תורה", "אותיות", "קריאה",
            "מגילה", "קציר חיטים", "מחרשה", "אפייה", "קמח", "בצק", "שמרים", "פחמימות"
        ];

        // לוגו עם השם "שבועס"
        const ShavuAsLogo = ({ className = "" }) => (
            <span className={`logo-container ${className}`}>
                <span>שב</span><span>ו</span><span className="shuruk-dot"></span><span>עס</span>
            </span>
        );

        const BikkurimBasket = ({ className = "" }) => (
            <svg className={className} viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                <circle cx="75" cy="40" r="6" fill="#9333ea"/>
                <circle cx="65" cy="40" r="6" fill="#9333ea"/>
                <circle cx="70" cy="33" r="6" fill="#a855f7"/>
                <circle cx="80" cy="48" r="6" fill="#a855f7"/>
                <circle cx="70" cy="48" r="6" fill="#7e22ce"/>
                <path d="M20 50 Q 15 25 35 15" stroke="#eab308" strokeWidth="4" strokeLinecap="round" fill="none"/>
                <path d="M25 50 Q 25 30 45 20" stroke="#f59e0b" strokeWidth="3" strokeLinecap="round" fill="none"/>
                <circle cx="45" cy="40" r="14" fill="#ef4444"/>
                <path d="M45 26 Q 50 20 55 22" stroke="#22c55e" strokeWidth="3" strokeLinecap="round" fill="none"/>
                <circle cx="58" cy="45" r="12" fill="#f97316"/>
                <path d="M15 50 L85 50 L75 90 L25 90 Z" fill="#d97706" stroke="#92400e" strokeWidth="3" strokeLinejoin="round"/>
                <path d="M22 63 L78 63 M24 76 L76 76" stroke="#b45309" strokeWidth="3" strokeLinecap="round"/>
                <path d="M35 50 L35 90 M50 50 L50 90 M65 50 L65 90" stroke="#b45309" strokeWidth="3" strokeLinecap="round"/>
                <rect x="10" y="44" width="80" height="12" rx="6" fill="#f59e0b" stroke="#92400e" strokeWidth="3"/>
            </svg>
        );

        const SickleIcon = ({ className = "" }) => (
            <svg className={className} viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <rect x="10" y="11" width="4" height="11" rx="1" fill="#92400e" stroke="#78350f" strokeWidth="0.5"/>
                <path d="M13 12 C 1 13, -1 2, 10 1 C 4 3, 4 9, 9.5 9.5 L 13 12 Z" fill="#cbd5e1" stroke="#94a3b8" strokeWidth="1" strokeLinejoin="round"/>
            </svg>
        );

        const playSound = (type) => {
            try {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                if (!AudioContext) return;
                const ctx = new AudioContext();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain); gain.connect(ctx.destination);
                const now = ctx.currentTime;
                if (type === 'timer') {
                    osc.type = 'square'; osc.frequency.setValueAtTime(150, now);
                    gain.gain.setValueAtTime(0.1, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.4);
                    osc.start(now); osc.stop(now + 0.4);
                } else if (type === 'victory') {
                    osc.type = 'triangle'; [523.25, 659.25, 783.99, 1046.50].forEach((n, i) => osc.frequency.setValueAtTime(n, now + (i * 0.15)));
                    gain.gain.setValueAtTime(0.2, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.8);
                    osc.start(now); osc.stop(now + 0.8);
                }
            } catch (e) {}
        };

        const SYNC_KEY = 'shavu_as_sync_final_v19';
        const channel = new BroadcastChannel('shavu_as_channel_v19');

        const App = () => {
            const [isProjector] = useState(() => window.location.search.includes('mode=projector'));
            const [showInstructions, setShowInstructions] = useState(false);
            const [showEndGameConfirm, setShowEndGameConfirm] = useState(false);
            const [gameState, setGameState] = useState('SETUP');
            const [teams, setTeams] = useState([
                { id: 1, name: 'קבוצה 1', icon: ICONS[0], score: 1 }, 
                { id: 2, name: 'קבוצה 2', icon: ICONS[1], score: 1 }
            ]);
            const [activeIdx, setActiveIdx] = useState(0);
            const [roundDuration, setRoundDuration] = useState(60);
            const [timeLeft, setTimeLeft] = useState(60);
            const [words, setWords] = useState([]);
            const [points, setPoints] = useState({});
            const [penalties, setPenalties] = useState(0);
            const [playedInTurn, setPlayedInTurn] = useState(0);

            const activeTeam = teams[activeIdx] || teams[0];
            const targetIdx = (activeTeam.score - 1) % 8;
            const isRobbery = activeTeam.score % 8 === 0;
            const isNoPoints = teams.every(t => t.score <= 1);

            const broadcast = useCallback((data) => {
                if (isProjector) return;
                const state = { gameState, teams, activeIdx, roundDuration, timeLeft, words, points, penalties, playedInTurn, ...data };
                channel.postMessage(state);
                localStorage.setItem(SYNC_KEY, JSON.stringify(state));
            }, [isProjector, gameState, teams, activeIdx, roundDuration, timeLeft, words, points, penalties, playedInTurn]);

            useEffect(() => {
                const handleSync = (s) => {
                    if (!s) return;
                    if (s.gameState === 'SUMMARY' && gameState === 'PLAYING') playSound('timer');
                    if (s.gameState === 'WINNER' && gameState !== 'WINNER') playSound('victory');
                    setGameState(s.gameState); setTeams(s.teams); setActiveIdx(s.activeIdx);
                    setRoundDuration(s.roundDuration); setTimeLeft(s.timeLeft); setWords(s.words);
                    setPoints(s.points); setPenalties(s.penalties); setPlayedInTurn(s.playedInTurn);
                };
                channel.onmessage = (e) => handleSync(e.data);
                if (isProjector) {
                    const saved = localStorage.getItem(SYNC_KEY);
                    if (saved) handleSync(JSON.parse(saved));
                }
            }, [isProjector, gameState]);

            useEffect(() => {
                let timer;
                if (!isProjector && gameState === 'PLAYING' && !isRobbery && timeLeft > 0) {
                    timer = setInterval(() => {
                        setTimeLeft(prev => {
                            const nt = prev - 1;
                            broadcast({ timeLeft: nt });
                            return nt;
                        });
                    }, 1000);
                } else if (!isProjector && gameState === 'PLAYING' && !isRobbery && timeLeft === 0) {
                    playSound('timer'); setGameState('SUMMARY'); broadcast({ gameState: 'SUMMARY' });
                }
                return () => clearInterval(timer);
            }, [gameState, timeLeft, isProjector, isRobbery, broadcast]);

            const startTurn = () => {
                const initPoints = {}; teams.forEach(t => initPoints[t.id] = 0);
                const newWords = [...WORDS_POOL].sort(() => 0.5 - Math.random()).slice(0, 8);
                const up = { gameState: 'PLAYING', timeLeft: roundDuration, points: initPoints, penalties: 0, playedInTurn: 0, words: newWords };
                setGameState('PLAYING'); setTimeLeft(roundDuration); setPoints(initPoints); setPenalties(0); setPlayedInTurn(0); setWords(newWords);
                broadcast(up);
            };

            const handleAnswer = (id) => {
                const nextPoints = { ...points };
                let nextPenalties = penalties;
                const nextPlayed = playedInTurn + 1;
                if (id === 'SKIP') nextPenalties++; else nextPoints[id] = (nextPoints[id] || 0) + 1;

                if (isRobbery && nextPlayed >= 5) {
                    playSound('timer');
                    setGameState('SUMMARY'); broadcast({ gameState: 'SUMMARY', points: nextPoints, penalties: nextPenalties, playedInTurn: nextPlayed });
                } else {
                    const newWords = [...WORDS_POOL].sort(() => 0.5 - Math.random()).slice(0, 8);
                    setPoints(nextPoints); setPenalties(nextPenalties); setPlayedInTurn(nextPlayed); setWords(newWords);
                    broadcast({ points: nextPoints, penalties: nextPenalties, playedInTurn: nextPlayed, words: newWords });
                }
            };

            const finalize = () => {
                const nextTeams = teams.map(t => {
                    const p = points[t.id] || 0;
                    const pen = t.id === activeTeam.id ? penalties : 0;
                    return { ...t, score: Math.min(100, Math.max(1, t.score + p - pen)) };
                });
                const nextIdx = (activeIdx + 1) % nextTeams.length;
                setTeams(nextTeams);
                if (nextTeams.some(t => t.score >= 100)) {
                    playSound('victory');
                    setGameState('WINNER'); broadcast({ teams: nextTeams, gameState: 'WINNER' });
                } else {
                    setActiveIdx(nextIdx); setGameState('BOARD'); broadcast({ teams: nextTeams, gameState: 'BOARD', activeIdx: nextIdx });
                }
            };

            const endGameNow = () => {
                playSound('victory'); setGameState('WINNER'); broadcast({ gameState: 'WINNER' });
            };

            const resetGame = () => {
                const resetTeams = teams.map(t => ({ ...t, score: 1 }));
                setTeams(resetTeams); setGameState('SETUP'); setActiveIdx(0); setRoundDuration(60);
                broadcast({ teams: resetTeams, gameState: 'SETUP', activeIdx: 0, roundDuration: 60 });
            };

            const Credit = () => (
                <div className="mt-4 text-center text-[12px] md:text-[14px] font-bold text-brand-green opacity-100 hover:opacity-80 transition-opacity">
                    <a href="https://www.pisgah.org.il/" target="_blank" className="hover:underline">חג שבועות שמח - באהבה פסג"ה חדרה 🌾</a>
                </div>
            );

            if (isProjector) {
                return (
                    <div className="h-screen overflow-hidden flex flex-col p-2 md:p-6 bg-gray-50 text-center">
                        <div className="flex flex-col h-full gap-2 md:gap-4 max-w-[1000px] mx-auto w-full">
                            {gameState === 'PLAYING' && (
                                <div className="mx-auto bg-white border border-green-100 rounded-full py-2 px-10 shadow-sm shrink-0">
                                    {isRobbery ? <div className="text-xl md:text-3xl font-bold text-brand-green animate-pulse"><SickleIcon className="w-8 h-8 inline-block ml-2 mb-1" /> סיבוב הקוצר! כולם מנחשים <SickleIcon className="w-8 h-8 inline-block mr-2 mb-1 transform scale-x-[-1]" /></div> : <div className="text-4xl md:text-6xl font-bold text-brand-green">{timeLeft}</div>}
                                </div>
                            )}
                            <div className="flex-grow bg-white rounded-[1.5rem] md:rounded-[2rem] p-4 md:p-6 shadow-sm border border-emerald-50 flex flex-col min-h-0">
                                <h2 className="text-xl md:text-3xl font-bold text-brand-green mb-2 md:mb-4">
                                    {gameState === 'SETUP' ? <span>ברוכים הבאים ל<ShavuAsLogo />! 🌾</span> : (gameState === 'WINNER' ? <span className="flex items-center justify-center gap-3">תוצאות סופיות! <BikkurimBasket className="w-8 h-8 inline" /></span> : `תור: ${activeTeam.icon} ${activeTeam.name}`)}
                                </h2>
                                {/* חסם למקרן - יחס 1:1, מונע מתיחה למלבנים */}
                                <div className="w-full flex-grow flex items-center justify-center min-h-0">
                                    <div className="board-grid bg-gray-100/50 p-2 rounded-2xl h-full w-full max-w-[calc(100vh-200px)] max-h-[calc(100vw-50px)] mx-auto">
                                        {Array.from({ length: 100 }).map((_, i) => {
                                            const s = i + 1;
                                            const here = teams.filter(t => (gameState === 'SUMMARY' ? Math.max(1, t.score + (points[t.id] || 0) - (t.id === activeTeam.id ? penalties : 0)) : t.score) === s);
                                            return (
                                                <div key={s} className={`border border-white/60 rounded flex items-center justify-center relative ${s % 8 === 0 ? 'thief-space' : 'bg-white'}`}>
                                                    <span className="absolute top-0.5 right-1 text-[2vmin] text-gray-400 font-bold">{(s-1)%8+1}</span>
                                                    <div className="flex flex-wrap justify-center items-center h-full w-full">
                                                        {here.length > 0 ? (
                                                            here.map(t => <span key={t.id} className="text-[4vmin] drop-shadow-md">{t.icon}</span>)
                                                        ) : (
                                                            s === 100 ? <BikkurimBasket className="w-[5vmin] h-[5vmin] opacity-30" /> : null
                                                        )}
                                                    </div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>
                                <Credit />
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen flex flex-col items-center justify-center p-4 relative text-center">
                    {showInstructions && (
                        <div className="fixed inset-0 modal-overlay flex items-center justify-center p-4 z-[9999]">
                            <div className="bg-white rounded-3xl p-6 md:p-8 max-w-xl w-full shadow-2xl text-right overflow-y-auto max-h-[90vh]">
                                <h2 className="text-2xl md:text-3xl font-bold text-brand-green mb-4 border-b pb-4 text-center">
                                    איך משחקים ב<ShavuAsLogo />?
                                </h2>
                                <div className="space-y-5 text-gray-700 text-sm md:text-base leading-relaxed">
                                    <section className="bg-green-50 p-4 rounded-2xl border border-green-100">
                                        <h3 className="font-bold text-brand-green text-lg mb-2">📽️ הנחיות למורה (ניהול מקרן):</h3>
                                        <ol className="list-decimal list-inside space-y-1">
                                            <li>לחצו על הכפתור <b>"פתח חלון למקרן"</b> (למעלה משמאל).</li>
                                            <li>גררו את החלון החדש שנפתח אל מסך המקרן המורחב (המסך הגדול שפונה לכיתה).</li>
                                            <li><b>חשוב:</b> השאירו את המסך הזה (לוח הבקרה עם הכרטיסים) במחשב האישי שלכם. <b>התלמידים לא אמורים לראות את המילים שבמסך זה!</b></li>
                                            <li>הזמינו כל פעם נציג אחר מכל קבוצה של התלמידים להתקרב למחשב שלכם, לקרוא את המילה בכרטיס, ולהסביר אותה לחבריו.</li>
                                        </ol>
                                    </section>
                                    <section>
                                        <h3 className="font-bold text-brand-green text-lg mb-1">🎯 מהלך המשחק:</h3>
                                        <ul className="list-disc list-inside space-y-1">
                                            <li>המספר של המילה מהכרטיס שעליכם להסביר, נקבע לפי המיקום שלכם במפה.</li>
                                            <li>מסבירים את המילה מבלי להגיד אותה או את שורשה.</li>
                                            <li><b>ניחוש נכון</b> מקדם צעד. <b>דילוג</b> מוריד צעד.</li>
                                        </ul>
                                    </section>
                                    <section>
                                        <h3 className="font-bold text-brand-green text-lg mb-1"><SickleIcon className="w-5 h-5 inline-block ml-1" /> משבצות "הקוצר" (מסגרת ירוקה):</h3>
                                        <p>כשהחייל שלכם עוצר על משבצת כזו (8, 16 וכו'), מופעל סיבוב הקוצר! <b>אין טיימר וכל הקבוצות מנחשות ביחד</b>. הסיבוב נגמר אוטומטית אחרי 5 קלפים.</p>
                                    </section>
                                </div>
                                <button onClick={() => setShowInstructions(false)} className="w-full mt-8 bg-brand-green text-white font-bold text-lg py-4 rounded-xl shadow-lg active:scale-95 transition-all">הבנתי, בואו נתחיל!</button>
                            </div>
                        </div>
                    )}

                    {showEndGameConfirm && (
                        <div className="fixed inset-0 modal-overlay flex items-center justify-center p-4 z-[9999]">
                            <div className="bg-white rounded-3xl p-8 max-w-sm w-full shadow-2xl text-center bounce-in">
                                <div className="text-6xl mb-4">⚠️</div>
                                <h2 className="text-2xl font-bold text-gray-800 mb-2">לסיים את המשחק?</h2>
                                <p className="text-gray-600 mb-8 text-sm">פעולה זו תעצור את המשחק ותעביר אתכם מיד למסך הסיכום והמנצחים.</p>
                                <div className="flex gap-3">
                                    <button onClick={() => setShowEndGameConfirm(false)} className="flex-1 bg-gray-100 text-gray-600 font-bold py-3 rounded-xl hover:bg-gray-200 transition-all">ביטול</button>
                                    <button onClick={() => { setShowEndGameConfirm(false); endGameNow(); }} className="flex-1 bg-rose-500 text-white font-bold py-3 rounded-xl shadow-md hover:bg-rose-600 transition-all">כן, לסיים</button>
                                </div>
                            </div>
                        </div>
                    )}

                    <button onClick={() => window.open(window.location.href.split('?')[0] + "?mode=projector", '_blank')} className="absolute top-4 left-4 bg-white text-brand-green border border-green-100 px-4 py-1.5 rounded-full font-medium text-[11px] shadow-sm hover:bg-green-50 active:scale-95 transition-all">📽️ פתח חלון למקרן</button>
                    
                    {gameState === 'SETUP' && (
                        <div className="bg-white p-8 rounded-3xl card-shadow max-w-sm w-full border border-green-50 mt-12">
                            <h1 className="text-5xl font-bold mb-2 tracking-tight"><ShavuAsLogo /></h1>
                            <button onClick={() => setShowInstructions(true)} className="instruction-link mb-6 block mx-auto">הוראות משחק למורה ולכיתה</button>
                            
                            <div className="mb-6 text-right">
                                <label className="block text-xs font-bold text-gray-400 mb-2">
                                    זמן לסיבוב: {roundDuration === 90 ? '1:30 דקות' : (roundDuration === 60 ? 'דקה' : '30 שניות')}
                                </label>
                                <input 
                                    type="range" min="30" max="90" step="30" 
                                    value={roundDuration} 
                                    onChange={(e) => { const v = parseInt(e.target.value); setRoundDuration(v); setTimeLeft(v); broadcast({ roundDuration: v, timeLeft: v }); }}
                                    className="projector-slider mb-2"
                                />
                                <div className="flex justify-between text-[10px] text-gray-300 font-bold px-1">
                                    <span>30 ש'</span>
                                    <span>דקה</span>
                                    <span>1:30</span>
                                </div>
                            </div>

                            <div className="space-y-2">
                                {teams.map((t, i) => (
                                    <div key={t.id} className="flex items-center gap-2">
                                        <span className="text-xl">{t.icon}</span>
                                        <input type="text" value={t.name} onChange={(e) => { const nt = [...teams]; nt[i].name = e.target.value; setTeams(nt); broadcast({ teams: nt }); }} className="flex-grow border border-gray-100 rounded-lg p-2 font-bold focus:outline-none focus:border-brand-green" />
                                        {teams.length > 2 && i === teams.length - 1 && <button onClick={() => setTeams(teams.filter(tm => tm.id !== t.id))} className="text-red-300 px-2 font-bold">🗑️</button>}
                                    </div>
                                ))}
                                <button onClick={() => setTeams([...teams, { id: Date.now(), name: `קבוצה ${teams.length + 1}`, icon: ICONS[teams.length % 10], score: 1 }])} className="w-full border border-dashed border-green-200 text-brand-green py-2 rounded-xl text-[11px] font-bold">+ הוסף קבוצה</button>
                                <button onClick={() => { setGameState('BOARD'); broadcast({ gameState: 'BOARD' }); }} className="w-full mt-4 bg-brand-green text-white font-bold text-lg py-4 rounded-2xl shadow-lg active:scale-95">בואו נשחק!</button>
                            </div>
                            <Credit />
                        </div>
                    )}

                    {gameState === 'BOARD' && (
                        <div className="max-w-5xl w-full flex flex-col xl:flex-row gap-4 mx-auto mt-12">
                            <div className="xl:flex-[2.5] bg-white rounded-3xl p-4 md:p-6 shadow-sm border border-emerald-50">
                                <div className="flex justify-between items-center mb-4">
                                    <button onClick={() => setGameState('SETUP')} className="text-gray-400 text-[11px] font-medium hover:text-brand-green transition-colors">⚙️ הגדרות</button>
                                    <h2 className="text-xl font-bold text-brand-green mx-auto">מפת המשחק</h2>
                                    <button onClick={() => setShowEndGameConfirm(true)} className="text-rose-500 text-[11px] font-bold border border-rose-100 px-3 py-1 rounded-full hover:bg-rose-50 transition-colors">🏁 סיים משחק</button>
                                </div>
                                {/* יחס 1:1 למסך המורה - מונע מתיחה לחלוטין */}
                                <div className="flex justify-center h-[400px]">
                                    <div className="board-grid bg-gray-50 p-1 md:p-2 rounded-2xl w-full h-full max-w-[400px]">
                                        {Array.from({ length: 100 }).map((_, i) => (
                                            <div key={i+1} className={`border rounded flex items-center justify-center relative ${(i+1)%8===0 ? 'thief-space' : 'bg-white border-gray-100'}`}>
                                                <span className="absolute top-0.5 right-1 text-[11px] text-gray-400 font-bold">{(i)%8+1}</span>
                                                {teams.filter(t => t.score === (i+1)).map(t => <span key={t.id} className={`text-lg md:text-xl ${t.id === activeTeam.id ? 'animate-bounce' : ''}`}>{t.icon}</span>)}
                                                {i+1 === 100 && teams.filter(t=>t.score===100).length===0 && <BikkurimBasket className="w-6 h-6 opacity-30 absolute m-auto" />}
                                            </div>
                                        ))}
                                    </div>
                                </div>
                                <Credit />
                            </div>
                            <div className="xl:flex-1 bg-white p-6 rounded-3xl shadow-sm text-center flex flex-col justify-center border border-emerald-50">
                                <h3 className="text-2xl font-bold mb-2 text-brand-green">{activeTeam.icon} {activeTeam.name}</h3>
                                {isRobbery ? <div className="bg-brand-green text-white p-3 rounded-xl mb-4 font-bold animate-pulse text-sm"><SickleIcon className="w-5 h-5 inline-block ml-1 mb-0.5" /> הקוצר! כולם מנחשים</div> : <div className="bg-green-50 p-4 rounded-2xl mb-4 border border-green-100 shadow-inner"><p className="text-[10px] text-gray-400 uppercase mb-1">המשימה:</p><span className="text-5xl font-bold text-brand-green">{targetIdx + 1}</span></div>}
                                <button onClick={startTurn} className="w-full bg-brand-green text-white font-bold text-lg py-5 rounded-2xl shadow-md active:scale-95 transition-all">התחל תור!</button>
                            </div>
                        </div>
                    )}

                    {gameState === 'PLAYING' && (
                        <div className="max-w-sm w-full mx-auto mt-8 px-4">
                            <div className={`flex justify-between items-center p-3 rounded-xl bg-white shadow-sm border-b-4 mb-4 ${isRobbery ? 'border-brand-green' : 'border-green-400'}`}>
                                <span className="font-bold text-brand-green text-lg">{activeTeam.icon} {activeTeam.name}</span>
                                <span className="text-3xl font-black text-brand-green">{isRobbery ? <SickleIcon className="w-8 h-8 inline-block" /> : timeLeft}</span>
                            </div>
                            
                            <div className="playing-card">
                                {words.map((word, i) => (
                                    <div key={i} className={`flex items-center p-2 rounded-xl transition-all duration-300 ${i === targetIdx ? 'bg-brand-green text-white scale-105 shadow-lg z-10 font-bold' : 'opacity-20 grayscale scale-95'}`}>
                                        <div className={`w-7 h-7 rounded-full flex items-center justify-center font-black ml-3 shrink-0 ${i === targetIdx ? 'bg-white text-brand-green' : 'bg-gray-100'}`}>{i + 1}</div>
                                        <div className="text-xl tracking-tight leading-none">{word}</div>
                                    </div>
                                ))}
                            </div>

                            <div className="grid grid-cols-2 gap-3 mt-6">
                                <button onClick={() => handleAnswer('SKIP')} className="bg-white text-rose-500 py-4 rounded-xl font-bold border-2 border-rose-50 shadow-sm active:scale-95 transition-all text-sm">❌ דילוג (-1)</button>
                                {!isRobbery ? (
                                    <button onClick={() => handleAnswer(activeTeam.id)} className="bg-brand-green text-white py-4 rounded-xl font-black text-xl shadow-lg active:scale-95 transition-all">✅ נכון!</button>
                                ) : (
                                    <div className="col-span-2 grid grid-cols-2 gap-2 mt-2">
                                        {teams.map(t => <button key={t.id} onClick={() => handleAnswer(t.id)} className="bg-green-50 border border-green-100 text-brand-green py-2 rounded-lg text-xs font-bold shadow-sm">{t.icon} {t.name}</button>)}
                                    </div>
                                )}
                            </div>
                        </div>
                    )}

                    {gameState === 'SUMMARY' && (
                        <div className="bg-white p-10 rounded-[2rem] card-shadow max-w-sm w-full text-center border border-emerald-50 mt-12">
                            <h2 className="text-2xl font-bold text-brand-green mb-4">סיכום התור ⏰</h2>
                            <div className="bg-gray-50 p-5 rounded-2xl mb-6 space-y-2 text-right shadow-inner">
                                {isRobbery ? teams.map(t => (points[t.id] || 0) > 0 && <div key={t.id} className="flex justify-between"><span>{t.icon} {t.name}</span><span className="text-brand-green">+{points[t.id]}</span></div>) : <div className="flex justify-between font-bold"><span>נכונות:</span><span className="text-brand-green">{points[activeTeam.id] || 0}</span></div>}
                                <div className="flex justify-between text-rose-500"><span>דילוגים:</span><span>{penalties}</span></div>
                            </div>
                            <button onClick={finalize} className="w-full bg-brand-green text-white font-bold text-lg py-4 rounded-xl shadow-lg active:scale-95">חזרה למפה 🗺️</button>
                            <Credit />
                        </div>
                    )}

                    {gameState === 'WINNER' && (
                        <div className="text-center bg-white p-8 md:p-10 rounded-[2.5rem] card-shadow border border-emerald-50 mt-12 max-w-sm w-full">
                            <BikkurimBasket className="w-24 h-24 mx-auto mb-4 animate-bounce drop-shadow-lg" />
                            <h1 className="text-3xl font-bold text-brand-green mb-6 tracking-tight">סיכום המשחק!</h1>
                            
                            {isNoPoints && (
                                <p className="text-sm text-emerald-600/80 font-bold mb-6">לא הצטברו נקודות במשחק זה 🤷‍♂️</p>
                            )}
                            
                            <div className="bg-gray-50 p-4 rounded-3xl mb-8 space-y-3">
                                {teams.sort((a, b) => b.score - a.score).map((t, i) => (
                                    <div key={t.id} className={`flex justify-between items-center p-3 rounded-2xl transition-all ${!isNoPoints && i === 0 ? 'bg-yellow-50 border-2 border-yellow-400 shadow-md' : 'bg-white border border-gray-100'}`}>
                                        <div className="flex items-center gap-2">
                                            {!isNoPoints && <span className="text-xl">{i === 0 ? '👑' : i + 1 + '.'}</span>}
                                            <span className="text-2xl">{t.icon}</span>
                                            <span className={`text-lg font-bold ${!isNoPoints && i === 0 ? 'text-yellow-700' : 'text-gray-700'}`}>
                                                {!isNoPoints && i === 0 ? `${t.name} (מקום 1)` : t.name}
                                            </span>
                                        </div>
                                        {!isNoPoints && <div className={`text-xl font-black ${i === 0 ? 'text-yellow-600' : 'text-brand-green'}`}>{t.score}</div>}
                                    </div>
                                ))}
                            </div>

                            <button onClick={resetGame} className="bg-brand-green text-white font-bold py-4 px-10 rounded-full text-xl shadow-xl active:scale-95 transition-all w-full">משחק חדש 🔄</button>
                            <Credit />
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
